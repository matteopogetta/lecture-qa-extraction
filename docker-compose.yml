services:
  lecture-analyzer:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["lecture-analyzer"]
    env_file:
      - path: .env
        required: false
    volumes:
      - ./local_models:/app/local_models:ro
      - ./sample_data:/app/sample_data:ro
      - ./tmp:/app/tmp
      - ./artifacts:/app/artifacts
    command: ["--help"]
